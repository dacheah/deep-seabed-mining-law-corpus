provenance_note: 'SCOPE (JC-007): ITLOS decisions in proceedings concerning the Area are in scope; party
  pleadings are not. NORI''s and TOML''s Applications are recorded in queue/candidates.md and deliberately
  NOT ingested. IDENTIFIER (JC-008): case-number based, ''case34-order6-2026'' decoding as Case 34, Order
  No. 6 of 2026. TEXT RECOVERY: the PDF''s text layer is NOT usable — pages 2 and 3 are CCITT 1-bit scans
  with no text layer at all, and page 1''s embedded font renders ''ORDER'' as ''OROER'' (a broken cmap,
  the same failure class as the BBNJ Arabic PDF). Text was therefore recovered by OCR of 300-dpi renders
  of the byte-exact original, using TWO independent engines: Tesseract 5.5.0 (--oem 3 --psm 6, eng) and
  Google Cloud Vision DOCUMENT_TEXT_DETECTION. Character agreement 98.9% overall (p1 99.3%, p2 99.5%,
  p3 96.4%), comparable to the 98.7% achieved for the BBNJ Arabic text. All 10 disagreement sites were
  adjudicated against the page images: Vision was adopted at 9 (Tesseract read closing double-quotes as
  apostrophes in five places, misread ''[a]t'' as ''[aJt'', rendered a handwritten signature as character
  noise, and garbled the Registrar''s name ''Ximena ... OYARCE'' as ''Xifhena ... OVARCE''); Tesseract
  was adopted at 1 (Vision inserted a spurious full stop in ''the submission. of the written statement'').
  STRUCTURAL NORMALISATION, wording untouched: running headers (''List of Cases No. 34'' / page number
  / ''Order 2026/6'') removed from pages 2-3 only, the same lines on page 1 being the document''s header
  block; hard line wraps rejoined into paragraphs; curly quotes normalised to straight, Vision having
  rendered them inconsistently within a single sentence; canonical UTF-8, LF, no BOM, one trailing newline.
  original.pdf remains the integrity anchor and original_sha256 is the hash of the official file itself.
  COVERAGE GAP: the order closes ''Done in English and in French, both texts being equally authoritative'',
  so French is an equally authentic text (cf. JC-004 for the 2011 Advisory Opinion); the French version
  is a recorded gap and would be ingested as the sibling record itlos/order/case34-order6-2026-fr under
  JC-006.'
