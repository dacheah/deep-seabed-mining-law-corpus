name: Reproducible extraction
on:
  push:
  pull_request:
  workflow_dispatch: {}
jobs:
  reproduce:
    runs-on: ubuntu-22.04   # Poppler 22.02.0 — the pinned toolchain for byte-exact PDF extraction
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Reproducibility gate — every record reproduced or declared, nothing unaccounted for
        # Was `python3 scripts/extract.py`, which aborted on the first record without a committed
        # extractor (the OCR-derived ITLOS order) and took 27 passing records' results down with
        # it. The gate walks authoritative/ as its denominator, applies scripts/repro-policy.json,
        # and fails only on a real mismatch, an extractor error, or an uncovered record beyond the
        # ratchet — so a genuinely non-reproducible record is declared, not fatal-on-sight.
        run: python3 scripts/repro_gate.py
