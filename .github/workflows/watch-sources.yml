name: Monthly source watch
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}
jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: watch
        run: python3 scripts/watch_sources.py
      - name: Commit advanced baselines
        run: |
          git config user.name "corpus-bot"
          git config user.email "corpus-bot@users.noreply.github.com"
          git add monitoring/sources.json monitoring/last_report.md || true
          git commit -m "chore(watch): update source baselines" || echo "no changes"
          git push || true
      - name: Open issue on change
        if: steps.watch.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('monitoring/last_report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Source watch: monitored page(s) changed (${new Date().toISOString().slice(0,10)})`,
              body, labels: ['source-watch']
            });
